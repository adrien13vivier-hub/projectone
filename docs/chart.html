<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique Portefeuille</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f7f6f2; --surface: #ffffff; --text: #1a1a1a;
    --muted: #666; --border: #e0ddd8; --green: #16a34a; --red: #dc2626;
  }
  [data-theme=dark] {
    --bg: #171614; --surface: #1c1b19; --text: #cdccca;
    --muted: #888; --border: #393836; --green: #4ade80; --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
          font-size: 15px; padding: 24px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .meta { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-full { margin-top: 20px; }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border);
           border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--muted); }
  canvas { max-height: 320px; }
  #assetLineChart { max-height: 360px; }
  .toggle { position: fixed; top: 16px; right: 16px; background: var(--surface);
             border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;
             cursor: pointer; font-size: 13px; color: var(--text); }
  .back { display: inline-block; margin-bottom: 16px; color: var(--muted);
           text-decoration: none; font-size: 13px; }
  .back:hover { color: var(--text); }
</style>
</head>
<body>
<button class="toggle" data-theme-toggle onclick="toggleTheme()">🌙 Sombre</button>
<a class="back" href="index.html">← Retour au rapport</a>
<h1>📈 Historique du Portefeuille</h1>
<p class="meta">Mis à jour le 23/07/2026 à 17:45 · 22 sessions · 30 derniers jours</p>

<div class="grid">
  <div class="card">
    <h2>PnL NET GLOBAL — 30 derniers jours (€)</h2>
    <canvas id="lineChart"></canvas>
  </div>
  <div class="card">
    <h2>PnL NET PAR VALEUR — dernier run</h2>
    <canvas id="barChart"></canvas>
  </div>
</div>

<div class="grid-full">
  <div class="card">
    <h2>PnL NET PAR ACTION — 30 derniers jours (€) — toutes les valeurs sur l'axe complet</h2>
    <canvas id="assetLineChart"></canvas>
  </div>
</div>

<script>
const labels      = ["2026-06-23 18:17", "2026-06-24 18:05", "2026-06-25 18:12", "2026-06-26 18:04", "2026-06-29 13:51", "2026-06-30 18:12", "2026-07-01 18:13", "2026-07-02 17:57", "2026-07-03 17:46", "2026-07-06 13:18", "2026-07-07 18:14", "2026-07-08 17:55", "2026-07-09 18:18", "2026-07-10 18:10", "2026-07-13 12:13", "2026-07-14 17:13", "2026-07-15 17:14", "2026-07-16 17:22", "2026-07-17 17:03", "2026-07-20 11:47", "2026-07-21 17:27", "2026-07-22 17:24"];
const pnlData     = [-75.49, -93.1, -105.96, -109.33, -107.63, -96.4, -98.39, -101.81, -101.74, -99.32, -89.47, -103.29, -90.11, -94.74, -93.67, -93.86, -98.8, -107.3, -109.94, -106.77, -95.23, -93.8];
const colors      = ["rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)"];
const bLabels     = ["Palantir Technologies", "CoreWeave", "JCDecaux", "Credit Agricole SA", "Abionyx Pharma"];
const bData       = [-29.65, -54.58, 4.36, 9.37, -23.3];
const bColors     = ["rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(34,197,94,0.8)", "rgba(34,197,94,0.8)", "rgba(239,68,68,0.8)"];
const lineDatasets = [{"label": "Abionyx Pharma", "data": [-20.18, -20.98, -21.78, -21.98, -21.68, -21.88, -21.58, -22.08, -21.33, -21.53, -23.04, -23.84, -22.98, -23.86, -23.48, -23.72, -23.66, -23.88, -23.58, -23.62, -23.78, -23.3], "borderColor": "#2563eb", "backgroundColor": "rgba(37,99,235,0.08)", "borderWidth": 2, "pointRadius": 3, "fill": false, "tension": 0.3, "spanGaps": true}, {"label": "CoreWeave", "data": [-12.88, -21.54, -22.97, -34.93, -32.61, -30.04, -48.71, -57.52, -58.84, -58.55, -56.5, -53.38, -40.19, -45.86, -46.2, -58.16, -66.53, -73.51, -73.63, -73.66, -64.8, -54.58], "borderColor": "#16a34a", "backgroundColor": "rgba(22,163,74,0.08)", "borderWidth": 2, "pointRadius": 3, "fill": false, "tension": 0.3, "spanGaps": true}, {"label": "Credit Agricole SA", "data": [3.12, 2.42, 3.67, 2.22, 1.72, 2.97, 1.82, 4.27, 4.22, 4.37, 3.02, -0.98, 1.27, 1.92, 3.07, 4.87, 4.77, 5.77, 4.42, 6.47, 7.57, 9.37], "borderColor": "#dc2626", "backgroundColor": "rgba(220,38,38,0.08)", "borderWidth": 2, "pointRadius": 3, "fill": false, "tension": 0.3, "spanGaps": true}, {"label": "JCDecaux", "data": [-2.02, -1.56, -1.92, -1.42, -0.94, -1.04, -0.92, 0.24, 0.48, 2.2, 1.88, 1.8, 2.44, 3.04, 3.2, 2.92, 3.12, 5.2, 4.36, 4.56, 4.16, 4.36], "borderColor": "#d97706", "backgroundColor": "rgba(217,119,6,0.08)", "borderWidth": 2, "pointRadius": 3, "fill": false, "tension": 0.3, "spanGaps": true}, {"label": "Palantir Technologies", "data": [-43.53, -51.44, -62.96, -53.22, -54.12, -46.41, -29.0, -26.72, -26.27, -25.81, -14.83, -26.89, -30.65, -29.98, -30.26, -19.77, -16.5, -20.88, -21.51, -20.52, -18.38, -29.65], "borderColor": "#7c3aed", "backgroundColor": "rgba(124,58,237,0.08)", "borderWidth": 2, "pointRadius": 3, "fill": false, "tension": 0.3, "spanGaps": true}];

const isDark    = () => document.documentElement.getAttribute('data-theme') === 'dark';
const gridColor = () => isDark() ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
const tickColor = () => isDark() ? '#888' : '#666';

function chartDefaults() {
  return {
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: tickColor(), maxTicksLimit: 8, font: { size: 11 } },
             grid: { color: gridColor() } },
      y: { ticks: { color: tickColor(), font: { size: 11 } },
             grid: { color: gridColor() }, beginAtZero: false },
    },
    animation: { duration: 400 },
  };
}

// Graphique PnL global
const lineCtx = document.getElementById('lineChart').getContext('2d');
const lineChart = new Chart(lineCtx, {
  type: 'line',
  data: {
    labels,
    datasets: [{
      data: pnlData,
      borderColor: '#01696f',
      backgroundColor: 'rgba(1,105,111,0.08)',
      borderWidth: 2,
      pointRadius: 3,
      fill: true,
      tension: 0.3,
      spanGaps: true,
    }],
  },
  options: { ...chartDefaults(), responsive: true, maintainAspectRatio: true },
});

// Graphique barres dernier run
const barCtx = document.getElementById('barChart').getContext('2d');
const barChart = new Chart(barCtx, {
  type: 'bar',
  data: {
    labels: bLabels,
    datasets: [{
      data: bData,
      backgroundColor: bColors,
      borderRadius: 6,
    }],
  },
  options: { ...chartDefaults(), responsive: true, maintainAspectRatio: true },
});

// Graphique par action — TOUTES sur l'axe X commun (spanGaps: true)
const assetCtx = document.getElementById('assetLineChart').getContext('2d');
const assetLineChart = new Chart(assetCtx, {
  type: 'line',
  data: {
    labels,
    datasets: lineDatasets,
  },
  options: {
    ...chartDefaults(),
    responsive: true,
    maintainAspectRatio: true,
    plugins: {
      legend: {
        display: true,
        position: 'top',
        labels: { color: tickColor(), font: { size: 11 }, boxWidth: 14 },
      },
    },
    scales: {
      x: {
        ticks: { color: tickColor(), maxTicksLimit: 8, font: { size: 11 } },
        grid:  { color: gridColor() },
      },
      y: {
        ticks: { color: tickColor(), font: { size: 11 } },
        grid:  { color: gridColor() },
        beginAtZero: false,
      },
    },
  },
});

function toggleTheme() {
  const root = document.documentElement;
  const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  document.querySelector('.toggle').textContent = next === 'dark' ? '☀️ Clair' : '🌙 Sombre';
  const updateColors = (c) => {
    if (c.options.scales?.x) {
      c.options.scales.x.ticks.color = tickColor();
      c.options.scales.x.grid.color  = gridColor();
      c.options.scales.y.ticks.color = tickColor();
      c.options.scales.y.grid.color  = gridColor();
    }
    if (c.options.plugins?.legend?.labels) {
      c.options.plugins.legend.labels.color = tickColor();
    }
    c.update();
  };
  [lineChart, barChart, assetLineChart].forEach(updateColors);
}

// Init thème système
if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.setAttribute('data-theme','dark');
  document.querySelector('.toggle').textContent = '☀️ Clair';
}
</script>
</body>
</html>
