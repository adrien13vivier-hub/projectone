name: Daily Portfolio Report v3.2

on:
  schedule:
    # ──────────────────────────────────────────────
    # Heure été CEST (UTC+2) — fin mars → fin octobre
    #   10h Paris = 08h UTC
    #   16h Paris = 14h UTC
    # ──────────────────────────────────────────────
    - cron: "0 8 * * 1-5"   # 10h00 Paris CEST (UTC+2) — ⚠️ hiver CET : changer en "0 9"
    - cron: "0 14 * * 1-5"  # 16h00 Paris CEST (UTC+2) — ⚠️ hiver CET : changer en "0 15"
    # ──────────────────────────────────────────────
    # Hiver CET (UTC+1) — fin octobre → fin mars
    #   10h Paris = 09h UTC  → remplacer "0 8" par "0 9"
    #   16h Paris = 15h UTC  → remplacer "0 14" par "0 15"
    # ──────────────────────────────────────────────
  workflow_dispatch:

jobs:
  analyze:
    name: Génère le rapport quotidien v3.2
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Run analyzer v3.2
        env:
          FINNHUB_API_KEY:    ${{ secrets.FINNHUB_API_KEY }}
          EODHD_API_KEY:      ${{ secrets.EODHD_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python portfolio_analyzer.py

      - name: Generate HTML for Cloudflare Pages
        run: python generate_html.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapport-${{ github.run_number }}
          path: |
            reports/daily_report.md
            docs/index.html
          retention-days: 90

      - name: Commit rapport + page HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/daily_report.md docs/index.html docs/archive.json
          git diff --cached --quiet || git commit -m "📊 Rapport v3.2 — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
