# Réactivé le 2026-05-15 — cron forcé actif (commit de réactivation)
name: Daily Portfolio Report v5.1

on:
  schedule:
    # Tir principal  : 14:00 UTC = 16:00 Paris (CEST)
    - cron: "0 14 * * 1-5"
    # Tir de rattrapage : 15:00 UTC = 17:00 Paris (CEST)
    # Si GitHub rate le tir de 14h, celui-ci prend le relais.
    - cron: "0 15 * * 1-5"
  workflow_dispatch:
    inputs:
      force_mail:
        description: "Forcer l'envoi du mail même sans erreur API"
        required: false
        default: "false"

# ── Anti double-run : un seul job actif à la fois par jour ──────────────────
concurrency:
  group: daily-report-${{ github.ref }}-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyse & Rapport
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 0. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      # ── 1. Guard anti-doublon (cron uniquement, jamais sur run manuel) ─────
      - name: Check if report already generated today (schedule only)
        id: check_today
        run: |
          # workflow_dispatch = run manuel → on laisse toujours passer
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "already_done=false" >> $GITHUB_OUTPUT
            echo "🖐️ Run manuel détecté — guard désactivé, analyse forcée."
            exit 0
          fi
          # Cron automatique → vérifier si rapport déjà commité aujourd'hui
          TODAY=$(date -u +'%Y-%m-%d')
          LAST_COMMIT=$(git log --oneline --format="%s" -5 | grep "Rapport quotidien $TODAY" || true)
          if [ -n "$LAST_COMMIT" ]; then
            echo "already_done=true" >> $GITHUB_OUTPUT
            echo "✅ Rapport déjà généré aujourd'hui ($TODAY), tir de rattrapage ignoré."
          else
            echo "already_done=false" >> $GITHUB_OUTPUT
            echo "🚀 Aucun rapport pour $TODAY, démarrage de l'analyse."
          fi

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        if: steps.check_today.outputs.already_done == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.check_today.outputs.already_done == 'false'
        run: |
          pip install --upgrade pip
          pip install requests matplotlib

      # ── 3. Analyse ─────────────────────────────────────────────────────────
      - name: Run portfolio analysis
        if: steps.check_today.outputs.already_done == 'false'
        id: analysis
        env:
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          EODHD_API_KEY:        ${{ secrets.EODHD_API_KEY }}
          TWELVEDATA_API_KEY:   ${{ secrets.TWELVEDATA_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          mkdir -p reports/charts cache docs
          python portfolio_analyzer.py
          echo "Script portfolio_analyzer.py terminé avec code $?"

      # ── 4. Génération HTML → docs/index.html (Cloudflare Pages) ──────────
      - name: Generate HTML report for Cloudflare Pages
        if: steps.check_today.outputs.already_done == 'false'
        id: generate_html
        env:
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          EODHD_API_KEY:        ${{ secrets.EODHD_API_KEY }}
          TWELVEDATA_API_KEY:   ${{ secrets.TWELVEDATA_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          mkdir -p docs
          python generate_html.py
          echo "Script generate_html.py terminé avec code $?"
          ls -lh docs/index.html || echo "AVERTISSEMENT : docs/index.html non trouvé"

      # ── 5. Commit rapport + graphiques + page HTML ────────────────────────
      - name: Commit report, charts & HTML page
        if: steps.check_today.outputs.already_done == 'false'
        run: |
          git config user.name  "Portfolio Bot"
          git config user.email "bot@portfolio-analyzer"
          git add reports/
          git add docs/
          git add cache/ || true
          if git diff --cached --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "📊 Rapport quotidien $(date +'%Y-%m-%d %H:%M') Paris"
            git push
          fi

      # ── 6. Upload artifact (rapport + graphiques) ─────────────────────────
      - name: Upload report artifact
        if: always() && steps.check_today.outputs.already_done == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-report-${{ github.run_number }}
          path: |
            reports/daily_report.md
            reports/charts/*.png
            reports/history.csv
            docs/index.html
          retention-days: 30

      # ── 7. Préparer le corps du mail ──────────────────────────────────────
      - name: Prepare email body
        if: always() && steps.check_today.outputs.already_done == 'false'
        id: mail_body
        run: |
          DATE=$(date +'%d/%m/%Y')
          PNL=${PORTFOLIO_PNL_NET:-"N/D"}
          PCT=${PORTFOLIO_PNL_PCT:-"N/D"}
          ERRORS=${HAS_API_ERRORS:-"false"}
          ERR_DETAIL=${API_ERRORS_SUMMARY:-"Aucune"}

          if [ "$ERRORS" = "true" ]; then
            STATUS_ICON="⚠️"
            STATUS_MSG="Des données sont ERRONÉES ce run. Ne pas prendre de décision sans vérification."
          else
            STATUS_ICON="✅"
            STATUS_MSG="Toutes les sources de données ont répondu correctement."
          fi

          cat <<EOF > /tmp/mail_body.html
          <!DOCTYPE html>
          <html lang="fr">
          <head><meta charset="UTF-8"><style>
            body { font-family: -apple-system, Arial, sans-serif; background:#f9f8f5; color:#111827; padding:0; margin:0; }
            .container { max-width:640px; margin:32px auto; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,0.08); }
            .header { background:#01696f; color:#fff; padding:24px 32px; }
            .header h1 { margin:0; font-size:20px; }
            .header p { margin:4px 0 0; opacity:0.85; font-size:14px; }
            .body { padding:24px 32px; }
            .kpi { display:flex; gap:16px; margin:16px 0; }
            .kpi-box { flex:1; background:#f3f4f6; border-radius:8px; padding:14px 16px; text-align:center; }
            .kpi-box .val { font-size:22px; font-weight:700; }
            .kpi-box .lbl { font-size:11px; color:#6b7280; margin-top:4px; }
            .positive { color:#16a34a; }
            .negative { color:#dc2626; }
            .neutral  { color:#374151; }
            .alert { background:#fef3c7; border-left:4px solid #f59e0b; padding:12px 16px; border-radius:4px; margin:16px 0; font-size:13px; }
            .ok-box { background:#dcfce7; border-left:4px solid #16a34a; padding:12px 16px; border-radius:4px; margin:16px 0; font-size:13px; }
            .footer { background:#f3f4f6; padding:16px 32px; font-size:11px; color:#9ca3af; text-align:center; }
            a.btn { display:inline-block; background:#01696f; color:#fff; text-decoration:none; padding:10px 20px; border-radius:6px; font-size:13px; font-weight:600; margin-top:16px; }
          </style></head>
          <body>
          <div class="container">
            <div class="header">
              <h1>📊 Rapport Portefeuille — $DATE</h1>
              <p>Analyse quotidienne automatisée · v5.1</p>
            </div>
            <div class="body">
              <div class="kpi">
                <div class="kpi-box">
                  <div class="val">${PNL} €</div>
                  <div class="lbl">PnL Net estimé</div>
                </div>
                <div class="kpi-box">
                  <div class="val">${PCT}%</div>
                  <div class="lbl">Performance nette</div>
                </div>
                <div class="kpi-box">
                  <div class="val neutral">${STATUS_ICON}</div>
                  <div class="lbl">Statut APIs</div>
                </div>
              </div>

          EOF

          if [ "$ERRORS" = "true" ]; then
            echo "    <div class=\"alert\"><strong>⚠️ Données erronées détectées :</strong><br>${ERR_DETAIL}</div>" >> /tmp/mail_body.html
          else
            echo "    <div class=\"ok-box\"><strong>✅ APIs :</strong> ${STATUS_MSG}</div>" >> /tmp/mail_body.html
          fi

          cat <<EOF >> /tmp/mail_body.html
              <p style="font-size:13px;color:#374151;">Le rapport complet et les graphiques mensuels sont disponibles en pièces jointes et dans le dépôt GitHub.</p>
              <a class="btn" href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">Voir le run GitHub Actions</a>
            </div>
            <div class="footer">Portfolio Analyzer v5.1 · GitHub Actions · Sources : TwelveData + EODHD + Finnhub + AlphaVantage (secours)<br>Score : Prix 30% + Sentiment 20% + Consensus 20% + Historique 30%</div>
          </div>
          </body></html>
          EOF

          echo "mail_body_path=/tmp/mail_body.html" >> $GITHUB_OUTPUT

      # ── 8. Envoi mail ──────────────────────────────────────────────────────
      - name: Send daily report email
        if: always() && steps.check_today.outputs.already_done == 'false' && env.MAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v6
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port:    ${{ secrets.MAIL_PORT }}
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          subject:        "📊 Rapport Portefeuille ${{ github.run_number }} — PnL ${{ env.PORTFOLIO_PNL_NET }}€ (${{ env.PORTFOLIO_PNL_PCT }}%) ${{ env.HAS_API_ERRORS == 'true' && '⚠️ Erreurs API' || '✅ OK' }}"
          to:             ${{ secrets.MAIL_TO }}
          from:           ${{ secrets.MAIL_FROM }}
          html_body:      file:///tmp/mail_body.html
          attachments:    reports/daily_report.md,reports/charts/*.png
          ignore_cert:    false
          convert_markdown: false
          priority:       normal

      # ── 9. Alerte erreurs API critiques ───────────────────────────────────
      - name: Send ALERT email on critical API errors
        if: always() && steps.check_today.outputs.already_done == 'false' && env.HAS_API_ERRORS == 'true' && env.MAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v6
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port:    ${{ secrets.MAIL_PORT }}
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          subject:        "🔴 ALERTE — Données erronées dans le rapport du ${{ github.run_number }}"
          to:             ${{ secrets.MAIL_TO }}
          from:           ${{ secrets.MAIL_FROM }}
          body: |
            ⚠️ ALERTE PORTFOLIO ANALYZER v5.1

            Des données sont erronées ou indisponibles dans le rapport du jour.
            Ne prenez pas de décision d'investissement sans vérifier manuellement les cours.

            Erreurs détectées :
            ${{ env.API_ERRORS_SUMMARY }}

            Run GitHub Actions : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            Portfolio Analyzer v5.1 — Alerte automatique
          priority:       high
