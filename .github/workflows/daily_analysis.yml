name: Daily Portfolio Analysis

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    name: Generate Portfolio Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz

      - name: Run portfolio analysis
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python portfolio_analyzer.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/daily_report.md
          git diff --cached --quiet || git commit -m "Daily report $(date +'%Y-%m-%d')"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-portfolio-report
          path: reports/daily_report.md
          retention-days: 30
