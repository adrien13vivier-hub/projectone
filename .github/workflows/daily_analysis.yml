name: Daily Portfolio Analysis

on:
  schedule:
    - cron: "0 14 * * 1-5"    # 16h00 Paris (CEST)
    - cron: "30 16 * * 1-5"   # 18h30 Paris (CEST)
  workflow_dispatch:

jobs:
  analyze_and_publish:
    name: Analyse + Génération page web
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz markdown

      - name: Run portfolio analysis
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python portfolio_analyzer.py

      - name: Generate HTML page
        run: |
          python generate_html.py

      - name: Commit report + page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/daily_report.md docs/index.html
          git diff --cached --quiet || git commit -m "Daily report $(date +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-portfolio-report
          path: reports/daily_report.md
          retention-days: 30
