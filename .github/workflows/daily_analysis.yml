name: 📊 Daily Portfolio Analysis

on:
  # Runs every weekday at 14:00 UTC = 16:00 Paris (CEST, UTC+2)
  schedule:
    - cron: "0 14 * * 1-5"

  # Manual trigger for testing
  workflow_dispatch:

jobs:
  analyze:
    name: Generate Portfolio Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run portfolio analysis
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python portfolio_analyzer.py

      - name: Commit report to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/daily_report.md
          git diff --cached --quiet || git commit -m "📊 Daily portfolio report — $(date +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-portfolio-report
          path: reports/daily_report.md
          retention-days: 30
