# v6.1 — Corrections guard anti-doublon + robustesse keepalive
name: Daily Portfolio Report v6.1

on:
  schedule:
    # Tir principal : 14:00 UTC = 16:00 Paris (CEST)
    - cron: "0 14 * * 1-5"
    # Tir de rattrapage : 15:00 UTC = 17:00 Paris (CEST)
    - cron: "0 15 * * 1-5"
  workflow_dispatch:

# ── Anti double-run : un seul job actif à la fois par jour ───────────────
concurrency:
  group: daily-report-${{ github.ref }}-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyse & Rapport
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 0. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      # ── 1. Guard anti-doublon CORRIGÉ ─────────────────────────────────
      # CORRECTION : on vérifie history.csv ET .last_run pour éviter le cas
      # où un run précédent a planté silencieusement (quota API atteint)
      # sans mettre à jour history.csv → le guard bloquait à tort le run suivant.
      - name: Check if report already generated today (schedule only)
        id: check_today
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "already_done=false" >> $GITHUB_OUTPUT
            echo "🖐️ Run manuel détecté — guard désactivé, analyse forcée."
            exit 0
          fi
          TODAY=$(date -u +'%Y-%m-%d')
          # Vérification dans history.csv (source de vérité principale)
          HISTORY_OK=false
          if [ -f "reports/history.csv" ] && grep -q "^$TODAY," reports/history.csv; then
            HISTORY_OK=true
          fi
          # Vérification dans .last_run (backup)
          LASTRUN_OK=false
          if [ -f "reports/.last_run" ] && grep -q "^$TODAY" reports/.last_run; then
            LASTRUN_OK=true
          fi
          # On considère "déjà fait" SEULEMENT si history.csv ET .last_run sont OK
          # Cela évite le cas où history.csv a été mis à jour mais .last_run non (ou vice versa)
          if $HISTORY_OK && $LASTRUN_OK; then
            echo "already_done=true" >> $GITHUB_OUTPUT
            echo "✅ Rapport confirmé dans history.csv ET .last_run pour $TODAY — tir de rattrapage ignoré."
          else
            echo "already_done=false" >> $GITHUB_OUTPUT
            if ! $HISTORY_OK; then
              echo "🚀 Aucune entrée pour $TODAY dans history.csv — démarrage de l'analyse."
            else
              echo "🚀 .last_run absent ou non mis à jour pour $TODAY — démarrage de l'analyse."
            fi
          fi

      # ── 2. Python ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        if: steps.check_today.outputs.already_done == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.check_today.outputs.already_done == 'false'
        run: |
          pip install --upgrade pip
          pip install requests matplotlib

      # ── 3. Debug : vérifier quelles clés API sont présentes ───────────────
      - name: Debug API keys presence
        if: steps.check_today.outputs.already_done == 'false'
        env:
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          EODHD_API_KEY:        ${{ secrets.EODHD_API_KEY }}
          TWELVEDATA_API_KEY:   ${{ secrets.TWELVEDATA_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          echo "=== Présence des clés API ==="
          [ -n "$FINNHUB_API_KEY" ]      && echo "✅ FINNHUB_API_KEY : présente"      || echo "❌ FINNHUB_API_KEY : ABSENTE"
          [ -n "$EODHD_API_KEY" ]        && echo "✅ EODHD_API_KEY : présente"        || echo "❌ EODHD_API_KEY : ABSENTE"
          [ -n "$TWELVEDATA_API_KEY" ]   && echo "✅ TWELVEDATA_API_KEY : présente"   || echo "❌ TWELVEDATA_API_KEY : ABSENTE"
          [ -n "$ALPHAVANTAGE_API_KEY" ] && echo "✅ ALPHAVANTAGE_API_KEY : présente" || echo "❌ ALPHAVANTAGE_API_KEY : ABSENTE"

      # ── 4. Analyse ───────────────────────────────────────────────────────
      - name: Run portfolio analysis
        if: steps.check_today.outputs.already_done == 'false'
        id: analysis
        env:
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          EODHD_API_KEY:        ${{ secrets.EODHD_API_KEY }}
          TWELVEDATA_API_KEY:   ${{ secrets.TWELVEDATA_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          mkdir -p reports/charts cache docs
          python portfolio_analyzer.py || { echo "❌ ERREUR portfolio_analyzer.py (code $?)"; exit 1; }

      # ── 5. Génération HTML → docs/index.html (Cloudflare Pages) ─────────
      - name: Generate HTML report for Cloudflare Pages
        if: steps.check_today.outputs.already_done == 'false'
        id: generate_html
        run: |
          mkdir -p docs
          python generate_html.py || { echo "❌ ERREUR generate_html.py (code $?)"; exit 1; }
          ls -lh docs/index.html || { echo "❌ docs/index.html non généré"; exit 1; }

      # ── 6. Génération du graphique PnL historique → docs/chart.html ──────
      - name: Generate PnL history chart
        if: steps.check_today.outputs.already_done == 'false'
        run: |
          python generate_chart.py || { echo "❌ ERREUR generate_chart.py (code $?)"; exit 1; }
          ls -lh docs/chart.html || { echo "❌ docs/chart.html non généré"; exit 1; }

      # ── 7. Commit rapport + graphiques + pages HTML ─────────────────────
      # CORRECTION : le commit est TOUJOURS effectué (même si diff minimal)
      # pour garantir l'activité du dépôt et éviter la désactivation GitHub.
      - name: Commit report, charts & HTML page
        if: steps.check_today.outputs.already_done == 'false'
        run: |
          git config user.name  "Portfolio Bot"
          git config user.email "bot@portfolio-analyzer"
          echo "$(date +'%Y-%m-%d %H:%M:%S UTC')" > reports/.last_run
          git add reports/
          git add docs/
          git add cache/ || true
          if git diff --cached --quiet; then
            # CORRECTION : même si aucun changement de données, on force un commit
            # minimal pour maintenir l'activité du dépôt (évite désactivation GitHub).
            echo "ℹ️ Aucun changement de données, mais commit minimal pour maintenir l'activité."
            git commit --allow-empty -m "📊 Rapport quotidien $(date +'%Y-%m-%d %H:%M') Paris (cache)"
          else
            git commit -m "📊 Rapport quotidien $(date +'%Y-%m-%d %H:%M') Paris"
          fi
          git push

      # ── 8. Upload artifact ────────────────────────────────────────────
      - name: Upload report artifact
        if: always() && steps.check_today.outputs.already_done == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-report-${{ github.run_number }}
          path: |
            reports/daily_report.md
            reports/charts/*.png
            reports/history.csv
            docs/index.html
            docs/chart.html
          retention-days: 30
